[theme]
base = "light"
primaryColor = "#165DFF"
backgroundColor = "#F5F7FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#172B4D"
font = "sans serif"

[client]
showSidebarNavigation = false
toolbarMode = "minimal"

[server]
maxUploadSize = 50
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false
